name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy LDDNS Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux server
        run: cargo build --release --bin server

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PUBLIC_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          scp target/release/server user1001@${{ secrets.PUBLIC_SERVER_IP }}:/tmp/lddns-server
          scp lddns-server.service user1001@${{ secrets.PUBLIC_SERVER_IP }}:/tmp/lddns-server.service
          ssh user1001@${{ secrets.PUBLIC_SERVER_IP }} << 'ENDSSH'
            if [ -f /usr/local/bin/lddns-server ]; then
              sudo systemctl stop lddns-server || true
            fi
            sudo mv /tmp/lddns-server /usr/local/bin/lddns-server
            sudo chmod +x /usr/local/bin/lddns-server

            if [ ! -f /etc/systemd/system/lddns-server.service ]; then
              sudo mv /tmp/lddns-server.service /etc/systemd/system/lddns-server.service
              sudo systemctl daemon-reload
              sudo systemctl enable lddns-server
            fi

            sudo systemctl restart lddns-server
            sudo systemctl status lddns-server --no-pager
          ENDSSH

      - name: Verify deployment
        run: |
          ssh user1001@${{ secrets.PUBLIC_SERVER_IP }} 'dig @localhost google.com +short'
