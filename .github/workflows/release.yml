name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ddns-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ddns-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binaries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp target/${{ matrix.target }}/release/client lddns-client-linux
          cp target/${{ matrix.target }}/release/server lddns-server-linux

      - name: Rename binaries (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/client.exe lddns-client-windows.exe
          cp target/${{ matrix.target }}/release/server.exe lddns-server-windows.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: lddns-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ddns-linux-x64/lddns-*
            ddns-windows-x64/lddns-*
          body: |
            ## Dynamic DNS System

            ### Linux
            ```bash
            chmod +x lddns-server-linux lddns-client-linux
            sudo ./lddns-server-linux --subnet 192.168.1
            ./lddns-client-linux --hostname mypc --subnet 192.168.1
            ```

            ### Windows
            ```powershell
            # Run as Administrator
            .\lddns-server-windows.exe --subnet 192.168.1
            .\lddns-client-windows.exe --hostname mypc --subnet 192.168.1
            ```

            ### List domains
            ```bash
            ./lddns-client-linux --list --server SERVER_IP
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
